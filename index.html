<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Game Art Showcase</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1>🎮 Финальные проекты учеников</h1>
  <p>Игровая графика: Zombie & Horror</p>
  <div class="theme-switch">
    <input type="checkbox" id="theme-toggle-checkbox">
    <label for="theme-toggle-checkbox" class="switch-label">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
      <span class="toggle"></span>
    </label>
  </div>
</header>

<nav class="teams">
  <button onclick="selectTeam('zombie')">🧟 Zombie Game</button>
  <button onclick="selectTeam('horror')">👻 Horror Game</button>
</nav>

<nav class="elements" id="elements"></nav>

<main id="gallery">
  <p class="hint">Выберите команду 👆</p>
</main>

<footer>
  <p>Игровой дизайн • финальные проекты</p>
</footer>

<script src="script.js"></script>
</body>
</html>
